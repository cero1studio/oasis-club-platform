<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Accede o crea tu cuenta en Oasis Club para gestionar membresías, pedidos y beneficios exclusivos.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://oasisclub.co/auth/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mi Cuenta Oasis Club | Ingreso Seguro">
    <meta property="og:description" content="Inicia sesión en Oasis Club para administrar tu experiencia de compra y membresía.">
    <meta property="og:url" content="https://oasisclub.co/auth/">
    <meta property="og:image" content="https://oasisclub.co/hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>Unirse al Club | Oasis Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--bg-cream);">
    <nav id="main-nav">
        <div class="container">
            <div class="nav-brand">
                <a href="index.html" class="logo">OASIS CLUB</a>
            </div>
        </div>
    </nav>

    <div class="auth-container reveal">
        <h2 style="font-family: var(--font-heading); text-align: center; color: var(--oasis-purple); margin-bottom: 2rem;">Bienvenido al Club</h2>
        
        <div class="tabs" style="display: flex; gap: 2rem; justify-content: center; margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
            <a href="auth.html" style="text-decoration: none; font-weight: 700; color: var(--oasis-purple);">INICIAR SESIÓN</a>
            <a href="auth.html?tab=registro" style="text-decoration: none; font-weight: 700; color: #999;">CREAR CUENTA</a>
        </div>

        <form>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="width: 100%; margin-top: 1rem;">Entrar al Oasis</button>
            
            <p style="text-align: center; margin-top: 2rem; font-size: 0.8rem;">
                <a href="contacto.html" style="color: var(--oasis-purple); text-decoration: none;">¿Olvidaste tu contraseña?</a>
            </p>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
